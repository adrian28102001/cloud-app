# Example only — DO NOT commit a real secret.
# Copy this file, edit values, and apply out-of-band per docs/DEPLOY.md:
#   kubectl -n cloud-app apply -f my-postgres-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cloud-app
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: appdb
