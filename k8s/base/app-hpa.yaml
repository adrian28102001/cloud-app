apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloud-app
  namespace: cloud-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloud-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
    # CPU-only: JVMs hold their committed heap, so memory-based scaling
    # produces false-positive scale-ups that overflow small nodes.
    # Demo: send load → CPU climbs → HPA adds replicas.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
