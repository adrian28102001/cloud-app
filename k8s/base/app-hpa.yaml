apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloud-app
  namespace: cloud-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloud-app
  minReplicas: 2
  # maxReplicas=3 (not 5) because each pod requests 256Mi and the 2x2Gi
  # worker nodes only fit ~3 app pods total alongside Postgres + monitoring
  # stack. Scaling to 4+ produces Pending pods and stuck rollouts.
  maxReplicas: 3
  metrics:
    # CPU-only: JVMs hold their committed heap, so memory-based scaling
    # produces false-positive scale-ups that overflow small nodes.
    # Demo: send load → CPU climbs → HPA adds replicas.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
