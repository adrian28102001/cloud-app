apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloud-app
  namespace: cloud-app
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: cloud-app
  namespaceSelector:
    matchNames:
      - cloud-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
