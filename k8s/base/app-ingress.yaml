apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-app
  namespace: cloud-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: cloud-app.REPLACE_ME.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloud-app
                port:
                  number: 80
